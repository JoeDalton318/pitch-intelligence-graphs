name: Python Linter

on:
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        
      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install black flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Vérification du formatage avec Black
        run: |
          # Utilise le mode --check pour remonter une erreur si un fichier n'est pas formaté
          black --check src/
          
      - name: Analyse statique avec Flake8
        run: |
          # Tolérance sur la longueur des lignes à 120 caractères (standard avec Black)
          flake8 src/ --count --max-complexity=10 --max-line-length=120 --statistics
