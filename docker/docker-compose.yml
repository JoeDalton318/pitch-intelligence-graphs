# docker-compose.yml — Projet 6 (Graphe & réseaux de passes) — autoportant
# Fichier central d'orchestration de tous les services
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: [ "9000:9000", "9001:9001" ]
    volumes: [ "minio_data:/data" ]

  minio-init:
    image: minio/mc:latest
    depends_on: [ minio ]
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 minio minio12345; mc mb -p local/bronze local/silver local/gold; exit 0;"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app12345
      POSTGRES_DB: gold
    ports: [ "5432:5432" ]
    volumes:
      - "pg_data:/var/lib/postgresql/data"
      - "../database/postgres:/docker-entrypoint-initdb.d:ro"

  airflow:
    image: apache/airflow:2.10.4
    depends_on: [ postgres ]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # Airflow ecrit ses metadonnees dans la base "airflow" (creee par 00_init_airflow_db.sql),
      # PAS dans "gold" qui reste dediee aux indicateurs metier.
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://app:app12345@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # PYTHONPATH pour que le DAG trouve utils.s3_client et src.processing.*
      PYTHONPATH: "/opt/airflow:/opt/airflow/dags:/opt/airflow/src_project"
      # Dependances installees au demarrage (dev only)
      _PIP_ADDITIONAL_REQUIREMENTS: "duckdb pandas pyarrow minio"
      # Config MinIO — lues par utils/s3_client.py au runtime
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
    ports: [ "8080:8080" ]
    volumes:
      - "./dags:/opt/airflow/dags"
      - "../src:/opt/airflow/src_project/src"
    command: standalone

  superset:
    image: apache/superset:latest
    environment:
      SUPERSET_SECRET_KEY: change_me_please
    ports: [ "8088:8088" ]
    volumes: [ "superset_home:/app/superset_home" ]

  ollama:
    image: ollama/ollama:latest
    ports: [ "11434:11434" ]
    volumes: [ "ollama_data:/root/.ollama" ]
    # GPU optionnel : decommenter si carte NVIDIA disponible
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4j12345
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports: [ "7474:7474", "7687:7687" ]
    volumes: [ "neo4j_data:/data" ]

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: app
      MONGO_INITDB_ROOT_PASSWORD: app12345
    ports: [ "27017:27017" ]
    volumes: [ "mongo_data:/data/db" ]

volumes:
  minio_data:
  pg_data:
  superset_home:
  ollama_data:
  neo4j_data:
  mongo_data: